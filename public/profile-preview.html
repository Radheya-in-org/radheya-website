<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Radheya Profile</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a1a; color: #f5f0e8; font-family: system-ui, sans-serif; padding: 40px; text-align: center; }
  h1 { color: #C9A84C; margin-bottom: 30px; font-size: 20px; letter-spacing: 3px; }
  canvas { display: block; margin: 0 auto; }
  .row { display: flex; flex-wrap: wrap; justify-content: center; align-items: flex-end; gap: 30px; margin-top: 30px; }
  .item { text-align: center; }
  .item canvas { border-radius: 50%; }
  .lbl { color: #888; font-size: 11px; margin-top: 6px; }
  .use { color: #C9A84C; font-size: 10px; margin-top: 2px; }
  .btns { margin-top: 30px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .btn { background: #C9A84C; color: #0A0A0A; border: none; padding: 10px 22px; font-size: 13px; font-weight: 700; cursor: pointer; border-radius: 6px; letter-spacing: 1px; }
  .btn:hover { background: #dbb855; }
  .btn.outline { background: transparent; border: 1px solid #C9A84C; color: #C9A84C; }
</style>
</head>
<body>
<h1>RADHEYA PROFILE</h1>

<canvas id="main" width="600" height="600"></canvas>

<div class="btns">
  <button class="btn" onclick="dl(1080,'radheya-profile-1080.png')">Download 1080px PNG</button>
  <button class="btn outline" onclick="dl(512,'radheya-profile-512.png')">Download 512px PNG</button>
  <button class="btn outline" onclick="dl(320,'radheya-profile-320.png')">Download 320px PNG</button>
</div>

<div class="row">
  <div class="item"><canvas id="s320" width="320" height="320"></canvas><div class="lbl">320px</div><div class="use">Instagram Profile</div></div>
  <div class="item"><canvas id="s150" width="150" height="150"></canvas><div class="lbl">150px</div><div class="use">Feed</div></div>
  <div class="item"><canvas id="s80" width="80" height="80"></canvas><div class="lbl">80px</div><div class="use">Story</div></div>
  <div class="item"><canvas id="s44" width="44" height="44"></canvas><div class="lbl">44px</div><div class="use">WhatsApp</div></div>
</div>

<script>
function drawSurya(ctx, S) {
  const W = S, H = S;
  const cx = W/2, cy = H*0.44;
  const R = W*0.155;

  // Background
  const bg = ctx.createRadialGradient(cx, H*0.45, W*0.05, cx, H*0.45, W*0.62);
  bg.addColorStop(0, '#7a1818');
  bg.addColorStop(0.4, '#5a0e0e');
  bg.addColorStop(1, '#2a0505');
  ctx.fillStyle = bg;
  ctx.fillRect(0,0,W,H);

  // Subtle texture noise
  ctx.globalAlpha = 0.03;
  for(let i=0;i<W*H*0.002;i++){
    ctx.fillStyle = Math.random()>0.5?'#fff':'#000';
    ctx.fillRect(Math.random()*W, Math.random()*H, 1, 1);
  }
  ctx.globalAlpha = 1;

  // Ambient glow
  const ag = ctx.createRadialGradient(cx, cy, R, cx, cy, R*3.5);
  ag.addColorStop(0, 'rgba(255,200,50,0.08)');
  ag.addColorStop(1, 'rgba(255,200,50,0)');
  ctx.fillStyle = ag;
  ctx.beginPath(); ctx.arc(cx,cy,R*3.5,0,Math.PI*2); ctx.fill();

  // Seeded random
  let seed = 777;
  function sr(){ seed=(seed*16807)%2147483647; return(seed-1)/2147483646; }

  // === FLAME RAYS ===
  // Draw each flame as a thick bezier with organic S-curves
  function drawFlame(angle, length, thickness, curlAmt, curlDir) {
    const cos = Math.cos(angle), sin = Math.sin(angle);
    const pcos = Math.cos(angle+Math.PI/2), psin = Math.sin(angle+Math.PI/2);

    // Start from sun edge
    const sx = cx + R*0.92*cos, sy = cy + R*0.92*sin;
    // End tip
    const ex = cx + (R+length)*Math.cos(angle + curlAmt*curlDir);
    const ey = cy + (R+length)*Math.sin(angle + curlAmt*curlDir);

    // Two control points for S-curve
    const d1 = R + length*0.33;
    const d2 = R + length*0.66;
    const c1x = cx + d1*Math.cos(angle + curlAmt*0.3*curlDir) + thickness*0.2*curlDir*pcos;
    const c1y = cy + d1*Math.sin(angle + curlAmt*0.3*curlDir) + thickness*0.2*curlDir*psin;
    const c2x = cx + d2*Math.cos(angle + curlAmt*0.7*curlDir) - thickness*0.15*curlDir*pcos;
    const c2y = cy + d2*Math.sin(angle + curlAmt*0.7*curlDir) - thickness*0.15*curlDir*psin;

    // Build flame shape — left side, tip, right side
    const bw = thickness;
    const tw = thickness * 0.04; // almost pointed tip

    // Gradient
    const g = ctx.createLinearGradient(sx,sy,ex,ey);
    g.addColorStop(0, '#D4A017');
    g.addColorStop(0.25, '#F0C838');
    g.addColorStop(0.5, '#EDBA28');
    g.addColorStop(0.8, '#E0A820');
    g.addColorStop(1, '#C89520');

    ctx.fillStyle = g;
    ctx.beginPath();

    // Left edge
    ctx.moveTo(sx + pcos*bw/2, sy + psin*bw/2);
    ctx.bezierCurveTo(
      c1x + pcos*bw*0.45, c1y + psin*bw*0.45,
      c2x + pcos*bw*0.15, c2y + psin*bw*0.15,
      ex + pcos*tw, ey + psin*tw
    );
    // Tip
    ctx.lineTo(ex - pcos*tw, ey - psin*tw);
    // Right edge back
    ctx.bezierCurveTo(
      c2x - pcos*bw*0.15, c2y - psin*bw*0.15,
      c1x - pcos*bw*0.45, c1y - psin*bw*0.45,
      sx - pcos*bw/2, sy - psin*bw/2
    );
    ctx.closePath();
    ctx.fill();

    // Bright inner spine
    const ig = ctx.createLinearGradient(sx,sy,ex,ey);
    ig.addColorStop(0, 'rgba(255,230,80,0.45)');
    ig.addColorStop(0.3, 'rgba(255,220,60,0.2)');
    ig.addColorStop(1, 'rgba(255,220,60,0)');
    ctx.fillStyle = ig;
    ctx.beginPath();
    ctx.moveTo(sx + pcos*bw*0.15, sy + psin*bw*0.15);
    ctx.bezierCurveTo(
      c1x + pcos*bw*0.12, c1y + psin*bw*0.12,
      c2x + pcos*bw*0.04, c2y + psin*bw*0.04,
      ex, ey
    );
    ctx.bezierCurveTo(
      c2x - pcos*bw*0.04, c2y - psin*bw*0.04,
      c1x - pcos*bw*0.12, c1y - psin*bw*0.12,
      sx - pcos*bw*0.15, sy - psin*bw*0.15
    );
    ctx.closePath();
    ctx.fill();

    // Dark outline stroke for definition
    ctx.strokeStyle = 'rgba(120,60,10,0.2)';
    ctx.lineWidth = W*0.001;
    ctx.beginPath();
    ctx.moveTo(sx + pcos*bw/2, sy + psin*bw/2);
    ctx.bezierCurveTo(
      c1x + pcos*bw*0.45, c1y + psin*bw*0.45,
      c2x + pcos*bw*0.15, c2y + psin*bw*0.15,
      ex + pcos*tw, ey + psin*tw
    );
    ctx.lineTo(ex - pcos*tw, ey - psin*tw);
    ctx.bezierCurveTo(
      c2x - pcos*bw*0.15, c2y - psin*bw*0.15,
      c1x - pcos*bw*0.45, c1y - psin*bw*0.45,
      sx - pcos*bw/2, sy - psin*bw/2
    );
    ctx.closePath();
    ctx.stroke();
  }

  // Main flames — spread from ~210° to ~330° (upper hemisphere + sides)
  const flameData = [
    // [angle offset from top (-PI/2), length multiplier, thickness multiplier, curl amount, curl direction]
    // Center top
    [0, 2.8, 0.22, 0.05, 1],
    // Near center
    [-0.22, 2.5, 0.18, 0.12, -1],
    [0.22, 2.5, 0.18, 0.1, 1],
    // Upper spread
    [-0.48, 2.3, 0.17, 0.18, -1],
    [0.48, 2.3, 0.17, 0.15, 1],
    // Mid spread
    [-0.75, 2.0, 0.16, 0.22, -1],
    [0.75, 2.0, 0.16, 0.2, 1],
    // Wide spread
    [-1.02, 1.7, 0.15, 0.28, -1],
    [1.02, 1.7, 0.15, 0.25, 1],
    // Very wide
    [-1.28, 1.4, 0.14, 0.32, -1],
    [1.28, 1.4, 0.14, 0.3, 1],
    // Almost horizontal
    [-1.52, 1.1, 0.13, 0.35, -1],
    [1.52, 1.1, 0.13, 0.33, 1],
    // Low sides
    [-1.72, 0.8, 0.12, 0.38, -1],
    [1.72, 0.8, 0.12, 0.35, 1],
    // Lowest — almost horizontal sweeping down-sides
    [-1.88, 0.55, 0.11, 0.4, -1],
    [1.88, 0.55, 0.11, 0.38, 1],
  ];

  // Draw main flames
  for (const [ao, lm, tm, curl, cd] of flameData) {
    const angle = -Math.PI/2 + ao;
    const len = R * lm * (0.9 + sr()*0.2);
    const thick = R * tm * (0.9 + sr()*0.2);
    drawFlame(angle, len, thick, curl + sr()*0.05, cd);
  }

  // Sub-flames between main flames (thinner, shorter)
  for (let i = 0; i < flameData.length - 1; i++) {
    const a1 = flameData[i][0], a2 = flameData[i+1][0];
    if (Math.sign(a1) !== Math.sign(a2) && a1 !== 0 && a2 !== 0) continue;
    const ao = (a1+a2)/2;
    const angle = -Math.PI/2 + ao;
    const parentLen = (flameData[i][1] + flameData[i+1][1])/2;
    const len = R * parentLen * 0.55 * (0.8 + sr()*0.3);
    const thick = R * 0.07;
    const cd = ao < 0 ? -1 : 1;
    drawFlame(angle, len, thick, 0.15 + sr()*0.1, cd);
  }

  // === SUN DISC ===
  // Outer glow ring
  const og = ctx.createRadialGradient(cx,cy,R*0.8,cx,cy,R*1.25);
  og.addColorStop(0, 'rgba(255,215,0,0.15)');
  og.addColorStop(1, 'rgba(255,215,0,0)');
  ctx.fillStyle = og;
  ctx.beginPath(); ctx.arc(cx,cy,R*1.25,0,Math.PI*2); ctx.fill();

  // Main disc
  const dg = ctx.createRadialGradient(cx-R*0.2, cy-R*0.2, R*0.1, cx, cy, R);
  dg.addColorStop(0, '#FFE44D');
  dg.addColorStop(0.25, '#FFD700');
  dg.addColorStop(0.6, '#F0C030');
  dg.addColorStop(1, '#D4A017');
  ctx.fillStyle = dg;
  ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.fill();

  // Dark outline on disc
  ctx.strokeStyle = 'rgba(100,50,0,0.25)';
  ctx.lineWidth = W*0.003;
  ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.stroke();

  // Highlight
  ctx.fillStyle = 'rgba(255,240,120,0.15)';
  ctx.beginPath(); ctx.arc(cx-R*0.15, cy-R*0.15, R*0.4, 0, Math.PI*2); ctx.fill();

  // === HORIZON ===
  const hY = cy + R + W*0.01;
  const hg = ctx.createLinearGradient(cx-R*2, hY, cx+R*2, hY);
  hg.addColorStop(0, 'rgba(212,160,23,0)');
  hg.addColorStop(0.2, 'rgba(212,160,23,0.5)');
  hg.addColorStop(0.5, '#D4A017');
  hg.addColorStop(0.8, 'rgba(212,160,23,0.5)');
  hg.addColorStop(1, 'rgba(212,160,23,0)');
  ctx.fillStyle = hg;
  ctx.beginPath(); ctx.ellipse(cx, hY, R*2, W*0.012, 0, 0, Math.PI*2); ctx.fill();

  // Shadow
  const sg = ctx.createRadialGradient(cx, hY+W*0.015, 0, cx, hY+W*0.015, R*1.5);
  sg.addColorStop(0, 'rgba(180,120,20,0.06)');
  sg.addColorStop(1, 'rgba(180,120,20,0)');
  ctx.fillStyle = sg;
  ctx.fillRect(0, hY, W, W*0.05);

  // === TEXT: "radheya.in" ===
  const fontSize = W * 0.075;
  ctx.font = `600 ${fontSize}px system-ui, -apple-system, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillStyle = '#E8B820';
  ctx.fillText('radheya.in', cx, hY + W*0.06);
}

// Render all
function renderAll() {
  [['main',600],['s320',320],['s150',150],['s80',80],['s44',44]].forEach(([id,s])=>{
    const c = document.getElementById(id);
    if(c){ c.width=s; c.height=s; drawSurya(c.getContext('2d'), s); }
  });
}
renderAll();

function dl(size, name) {
  const c = document.createElement('canvas');
  c.width = size; c.height = size;
  drawSurya(c.getContext('2d'), size);
  const a = document.createElement('a');
  a.download = name;
  a.href = c.toDataURL('image/png');
  a.click();
}
</script>
</body>
</html>
